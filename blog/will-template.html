<div class="card"><h2>四种遗嘱形式对比</h2><table><tr><th>形式</th><th>要求</th><th>优点</th></tr><tr><td><strong>自书遗嘱</strong></td><td>全文亲笔写+签名+日期</td><td>最简单，不需要见证人</td></tr><tr><td><strong>代书遗嘱</strong></td><td>两个以上见证人+代书人+遗嘱人签名</td><td>适合不会写字的人</td></tr><tr><td><strong>打印遗嘱</strong></td><td>两个以上见证人+每页签名</td><td>格式清晰</td></tr><tr><td><strong>公证遗嘱</strong></td><td>通过公证处办理</td><td>效力最高，不轻易被推翻</td></tr></table></div>
<div class="card"><h2>遗嘱无效的常见原因</h2><ul><li>没有签名或日期</li><li>打印后自己签名但无见证人（不符合自书遗嘱要求）</li><li>代书遗嘱只有一个见证人（必须两个以上）</li><li>遗嘱人精神状态不佳时立遗嘱</li><li>遗嘱内容处分了他人财产（如夫妻共同财产中配偶的一半）</li><li>受胁迫或欺骗所立遗嘱</li></ul></div>
<div class="card"><h2>常见问题</h2>
