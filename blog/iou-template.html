<div class="card"><h2>借条模板（可直接参考）</h2><div class="pre">借 条

借款人：张三（身份证号：440XXXXXXXXXXXXXXX）
出借人：李四（身份证号：440XXXXXXXXXXXXXXX）

今借到李四人民币 <strong>壹拾万元整（¥100,000.00）</strong>。

借款期限自2026年5月28日至2027年5月27日。
年利率为4%，到期一次性还本付息。

如逾期未还，按年利率6%计算逾期利息。

借款人（签名+按手印）：___________
日期：2026年5月28日</div></div>
<div class="card"><h2>借条必备要素</h2><ul><li><strong>双方全名+身份证号</strong> — "张哥""李姐"不行</li><li><strong>金额大写+小写</strong> — 大写防止篡改</li><li><strong>借款日期</strong> — 确定诉讼时效起点</li><li><strong>还款日期</strong> — 到期不还可起诉</li><li><strong>利息</strong> — 不写利息视为无息！</li><li><strong>借款人亲笔签名+按手印</strong></li><li><strong>最好有转账记录</strong> — 现金出借用银行取款记录佐证</li></ul></div>
<div class="card"><h2>常见问题</h2>
<div class="faq-item"><h3>没写利息的借条有效吗？</h3><p>有效，但视为无息借款。到期后可以主张逾期利息（按LPR算）。</p></div>
<div class="faq-item"><h3>借条和欠条有区别吗？</h3><p>有！借条证明借贷关系，欠条证明欠款关系（可能是货款、工程款等）。借钱一定要写"借条"不能写"欠条"。借条诉讼时效更长。</p></div></div>
