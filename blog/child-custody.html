<div class="card"><h2>抚养权判定标准</h2><table><tr><th>孩子年龄</th><th>判定原则</th></tr><tr><td><strong>2周岁以下</strong></td><td>原则上随母亲生活，除非母亲有严重疾病、不履行抚养义务等</td></tr><tr><td><strong>2-8周岁</strong></td><td>综合考量：经济条件、居住环境、谁实际带孩子、教育能力、是否有不良嗜好</td></tr><tr><td><strong>8周岁以上</strong></td><td>尊重孩子真实意愿，法院会单独询问孩子</td></tr></table></div>
<div class="card"><h2>争取抚养权的关键证据</h2><ul><li>与孩子的日常照片、视频（证明亲子关系）</li><li>接送孩子上下学的记录</li><li>辅导作业、参加家长会的证明</li><li>稳定的工作和收入证明</li><li>稳定住所的房产证或租赁合同</li><li>对方不适合带孩子的证据（家暴记录、酗酒、赌博等）</li></ul></div>
