<div class="card"><h2>合同违约五大赔偿方式</h2><table><tr><th>方式</th><th>说明</th></tr><tr><td><strong>继续履行</strong></td><td>要求对方按合同履行义务，如强制过户、交付货物</td></tr><tr><td><strong>违约金</strong></td><td>按合同约定的违约金条款赔偿（过高可请求调低）</td></tr><tr><td><strong>定金罚则</strong></td><td>收定金方违约→双倍返还；付定金方违约→定金不退</td></tr><tr><td><strong>实际损失</strong></td><td>赔偿因违约造成的直接损失+可预见的间接损失</td></tr><tr><td><strong>解除合同</strong></td><td>根本违约时可解除合同+要求赔偿损失</td></tr></table></div>
<div class="card"><h2>违约金约定注意事项</h2><ul><li>违约金不能超过实际损失的30%，超出部分法院不支持</li><li>定金和违约金只能选一个主张</li><li>合同不写违约金也能主张实际损失赔偿</li><li>诉讼时效3年，从知道违约之日起算</li></ul></div>
<div class="card"><h2>常见问题</h2>
<div class="faq-item"><h3>没签书面合同能起诉违约吗？</h3><p>能。口头合同+聊天记录+转账记录+录音可构成证据链。但书面合同更有力。</p></div>
<div class="faq-item"><h3>合同违约金约定太高怎么办？</h3><p>向法院请求调低。法院以实际损失为基础，兼顾合同履行情况、过错程度等综合裁量。</p></div></div>
